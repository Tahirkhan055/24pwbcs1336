<!DOCTYPE html>
<html lang="en">
<head>

  <title>Responsive Table</title>
  <link rel="stylesheet" href="task14.css">
</head>
<body>

      <th>Name</th>
      <th>Age</th>

      <th>Email</th>

    <tr>
      <td data-label="Name">Sara Ahmed</td>
      <td data-label="Age">21</td>
      <td data-label="Department">IT</td>
      <td data-label="Email">sara@example.com</td>
    </tr>

    <tr>
      <td data-label="Name">Usman Ali</td>
      <td data-label="Age">22</td>
      <td data-label="Department">SE</td>
      <td data-label="Email">usman@example.com</td>
    </tr>
  </tbody>
</table>

</body>
</html>
